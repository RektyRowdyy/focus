services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: focus
      POSTGRES_PASSWORD: focus
      POSTGRES_DB: focus
    ports:
      - "5432:5432"
    volumes:
      - focus-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focus"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  focus-pg:
